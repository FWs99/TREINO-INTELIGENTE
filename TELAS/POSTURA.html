<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise Postural</title>
    <link rel="stylesheet" href="../CSS-TELAS/style-home.css">
    <script src="../SCRIPTS/auth.js"></script>
    <script src="../SCRIPTS/navegacao.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            redirecionarSeNaoAutenticado();
            adicionarLogoUsuario();
        });
    </script>
</head>
<body>
    <h1 class="page-title">Análise Postural</h1>

    <form id="posturalForm" action="/submit-postural" method="post" enctype="multipart/form-data">
        <fieldset class="section-group">
            <legend>Captura de Imagens</legend>

            <label for="imagem_frontal">Imagem Frontal (de frente):</label>
            <input type="file" id="imagem_frontal" name="imagem_frontal" accept="image/*">

            <label for="imagem_lateral_direita">Imagem Lateral Direita:</label>
            <input type="file" id="imagem_lateral_direita" name="imagem_lateral_direita" accept="image/*">

            <label for="imagem_lateral_esquerda">Imagem Lateral Esquerda:</label>
            <input type="file" id="imagem_lateral_esquerda" name="imagem_lateral_esquerda" accept="image/*">

            <label for="imagem_costas">Imagem de Costas:</label>
            <input type="file" id="imagem_costas" name="imagem_costas" accept="image/*">
        </fieldset>

        

            <label for="observacoes_postura">Observações Adicionais:</label>
            <textarea id="observacoes_postura" name="observacoes_postura" rows="4" cols="50" placeholder="Descreva outros desvios posturais identificados ou observações importantes."></textarea>
        </fieldset>

        

        
        <div class="button-row">
            <button type="submit" class="button-link">Próximo: Treino</button>
        </div>
    </form>

    <script>
        document.getElementById('posturalForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(e.target);

            try {
                console.log('Enviando análise postural...');
                
                const response = await fetch('/submit-postural', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                console.log('Resposta do servidor (postura):', result);

                if (result.success) {
                    // Salvar progresso usando sistema de navegação
                    navegacao.salvarProgresso('postura', {});
                    console.log('Análise postural salva com sucesso!');
                    
                    // Redirecionar diretamente para TREINO
                    window.location.href = '/TREINO.html';
                } else {
                    console.error('Erro do servidor (postura):', result.error);
                    alert('Erro ao salvar análise postural: ' + result.error);
                }
            } catch (error) {
                console.error('Erro na requisição (postura):', error);
                alert('Erro ao enviar dados. Tente novamente.');
            }
        });
    </script>
</body>
</html>
