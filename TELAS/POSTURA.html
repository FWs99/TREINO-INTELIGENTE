<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise Postural</title>
    <link rel="stylesheet" href="../CSS-TELAS/style-home.css">
    <script src="../SCRIPTS/auth.js"></script>
    <script src="../SCRIPTS/navegacao.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            redirecionarSeNaoAutenticado();
        });
    </script>
</head>
<body>
    <h1 class="page-title">Análise Postural</h1>

    <form id="posturalForm" action="/submit-postural" method="post" enctype="multipart/form-data">
        <fieldset class="section-group">
            <legend>Captura de Imagens</legend>

            <label for="imagem_frontal">Imagem Frontal (de frente):</label>
            <input type="file" id="imagem_frontal" name="imagem_frontal" accept="image/*">

            <label for="imagem_lateral_direita">Imagem Lateral Direita:</label>
            <input type="file" id="imagem_lateral_direita" name="imagem_lateral_direita" accept="image/*">

            <label for="imagem_lateral_esquerda">Imagem Lateral Esquerda:</label>
            <input type="file" id="imagem_lateral_esquerda" name="imagem_lateral_esquerda" accept="image/*">

            <label for="imagem_costas">Imagem de Costas:</label>
            <input type="file" id="imagem_costas" name="imagem_costas" accept="image/*">
        </fieldset>

        <fieldset class="section-group">
            <legend>Desvios Posturais Identificados</legend>

            <label>Região da Cabeça:</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="desvio_cabeca" value="cabeca_avancada"> Cabeça Avançada</label>
                <label><input type="checkbox" name="desvio_cabeca" value="inclinacao_lateral_direita"> Inclinação Lateral direita</label>
                <label><input type="checkbox" name="desvio_cabeca" value="inclinacao_lateral_esquerda"> Inclinação Lateral esquerda</label>
                <label><input type="checkbox" name="desvio_cabeca" value="torticolo"> Torcicolo</label>
            </div>

            <label>Região dos Ombros:</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="desvio_ombro" value="ombros_elevados"> Ombros Elevados</label>
                <label><input type="checkbox" name="desvio_ombro" value="ombros_assimétrico"> Ombros assimétrico</label>
                <label><input type="checkbox" name="desvio_ombro" value="protacao"> Protação de Ombros</label>
            </div>

            <label>Coluna Vertebral:</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="desvio_coluna" value="hiperlordose"> Hiperlordose (aumento lordose lombar)</label>
                <label><input type="checkbox" name="desvio_coluna" value="hipocifose"> Hipocifose (diminuição cifose torácica)</label>
                <label><input type="checkbox" name="desvio_coluna" value="escoliose"> Escoliose (desvio lateral)</label>
                <label><input type="checkbox" name="desvio_coluna" value="cifose_dorsal"> Cifose Dorsal Aumentada</label>
            </div>

            <label>Região Pélvica:</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="desvio_pelvis" value="antiversao"> Anteverssão Pélvica</label>
                <label><input type="checkbox" name="desvio_pelvis" value="retro_verssao"> Retroversão Pélvica</label>
                <label><input type="checkbox" name="desvio_pelvis" value="inclinacao_pelvis"> Inclinação Lateral da Pelve</label>
            </div>

            <label>Membros Inferiores:</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="desvio_mmii" value="joelhos_valgo"> Joelhos em Valgo (X)</label>
                <label><input type="checkbox" name="desvio_mmii" value="joelhos_varo"> Joelhos em Varo (O)</label>
                <label><input type="checkbox" name="desvio_mmii" value="pes_plano"> Pés Planos</label>
                <label><input type="checkbox" name="desvio_mmii" value="pes_cavo"> Pés Cavos</label>
                <label><input type="checkbox" name="desvio_mmii" value="discrepancia_mmii"> Discrepância de Comprimento dos Membros</label>
            </div>

            <label for="observacoes_postura">Observações Adicionais:</label>
            <textarea id="observacoes_postura" name="observacoes_postura" rows="4" cols="50" placeholder="Descreva outros desvios posturais identificados ou observações importantes."></textarea>
        </fieldset>

        

        <input type="submit" value="Enviar Análise Postural">
        <div class="button-row">
            <a class="button-link secondary" href="ANAMNESE.html">Voltar para Anamnese</a>
        </div>
    </form>

    <script>
        document.getElementById('posturalForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(e.target);

            try {
                console.log('Enviando análise postural...');
                
                const response = await fetch('/submit-postural', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                console.log('Resposta do servidor (postura):', result);

                if (result.success) {
                    alert('Dados salvos com sucesso! Análise postural concluída.');
                    
                    // Salvar progresso usando sistema de navegação
                    navegacao.salvarProgresso('postura', {});
                    console.log('Análise postural salva com sucesso!');
                    
                    // Redirecionar diretamente para TREINO
                    window.location.href = '/TREINO.html';
                } else {
                    console.error('Erro do servidor (postura):', result.error);
                    alert('Erro ao salvar análise postural: ' + result.error);
                }
            } catch (error) {
                console.error('Erro na requisição (postura):', error);
                alert('Erro ao enviar dados. Tente novamente.');
            }
        });
    </script>
</body>
</html>
