<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seu Plano de Treino Personalizado</title>
    <link rel="stylesheet" href="../CSS-TELAS/style-home.css">
    <script src="../SCRIPTS/auth.js"></script>
    <script src="../SCRIPTS/navegacao.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            redirecionarSeNaoAutenticado();
        });
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
        }

        .treino-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .treino-header {
            text-align: center;
            margin-bottom: 30px;
            color: #2bf0ff;
        }

        .treino-header h1 {
            font-size: 2.5em;
            margin: 0;
            text-shadow: 0 0 20px rgba(43, 240, 255, 0.5);
        }

        .info-pessoa {
            background: rgba(43, 240, 255, 0.1);
            border: 2px solid #2bf0ff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            color: #e0e0e0;
        }

        .info-pessoa h3 {
            color: #2bf0ff;
            margin-top: 0;
        }

        .treino-content {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(43, 240, 255, 0.3);
            border-radius: 12px;
            padding: 30px;
            backdrop-filter: blur(10px);
            color: #e0e0e0;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .treino-content h2,
        .treino-content h3,
        .treino-content h4 {
            color: #2bf0ff;
            margin-top: 25px;
            margin-bottom: 15px;
        }

        .treino-content h2 {
            border-bottom: 2px solid rgba(43, 240, 255, 0.3);
            padding-bottom: 10px;
        }

        .treino-content ul,
        .treino-content ol {
            margin: 15px 0;
            padding-left: 30px;
        }

        .treino-content li {
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
        }

        .spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 4px solid rgba(43, 240, 255, 0.3);
            border-top-color: #2bf0ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 30px 0;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95em;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2bf0ff 0%, #00bfff 100%);
            color: #000;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(43, 240, 255, 0.4);
        }

        .btn-secondary {
            background: rgba(43, 240, 255, 0.1);
            color: #2bf0ff;
            border: 2px solid #2bf0ff;
        }

        .btn-secondary:hover {
            background: #2bf0ff;
            color: #000;
        }

        .error-message {
            background: rgba(255, 100, 100, 0.1);
            border: 2px solid #ff6464;
            border-radius: 12px;
            padding: 20px;
            color: #ff6464;
            margin-bottom: 20px;
            text-align: center;
        }

        .success-message {
            background: rgba(125, 247, 142, 0.1);
            border: 2px solid #7df78e;
            border-radius: 12px;
            padding: 20px;
            color: #7df78e;
            margin-bottom: 20px;
            text-align: center;
        }

        .config-section {
            background: rgba(255, 165, 0, 0.1);
            border: 2px solid #ffa500;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            color: #ffa500;
        }

        .config-section h3 {
            color: #ffa500;
            margin-top: 0;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #e0e0e0;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(43, 240, 255, 0.3);
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 1em;
        }

        .input-group input:focus {
            outline: none;
            border-color: #2bf0ff;
            box-shadow: 0 0 10px rgba(43, 240, 255, 0.2);
        }

        @media print {
            .button-group, .config-section {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="treino-container">
        <div class="treino-header">
            <h1>🏋️ Seu Plano de Treino Personalizado</h1>
            <p>Gerado com base em sua avaliação completa</p>
        </div>

        <div id="configSection" class="config-section">
            <h3>⚙️ Configuração da IA</h3>
            <div class="input-group">
                <label for="apiKey">Chave de API do Google Gemini:</label>
                <input type="password" id="apiKey" placeholder="Cole sua chave de API aqui">
            </div>
            <button class="btn btn-primary" onclick="salvarChaveAPI()">Salvar Chave</button>
            <p style="font-size: 0.9em; margin-top: 10px;">
                📌 <a href="https://ai.google.dev/" target="_blank" style="color: inherit;">Obtenha sua chave aqui</a>
            </p>
        </div>

        <div id="infoContainer"></div>
        <div id="treinoContainer"></div>

        <div class="button-group">
            <button class="btn btn-secondary" onclick="navegacao.etapaAnterior()">← Voltar</button>
            <button class="btn btn-primary" onclick="window.print()">🖨️ Imprimir</button>
            <button class="btn btn-secondary" onclick="exportarPDF()">📥 Exportar PDF</button>
            <button class="btn btn-primary" onclick="navegacao.resetarProgresso()">🔄 Novo Treino</button>
        </div>
    </div>

    <script>
        // Adicionar logo do usuário ao carregar
        document.addEventListener('DOMContentLoaded', function() {
            adicionarLogoUsuario();
        });

        // Salvar chave de API no localStorage (apenas cliente)
        function salvarChaveAPI() {
            const apiKey = document.getElementById('apiKey').value.trim();
            if (!apiKey) {
                alert('Por favor, insira uma chave de API válida');
                return;
            }
            localStorage.setItem('geminApiKey', apiKey);
            alert('Chave de API salva com sucesso!');
            document.getElementById('configSection').style.display = 'none';
            gerarTreino();
        }

        // Carregar e gerar o treino
        async function gerarTreino() {
            const container = document.getElementById('treinoContainer');
            
            // Mostrar carregamento
            container.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>⏳ Gerando seu plano de treino personalizado...</p>
                    <p style="font-size: 0.9em; color: #888;">Isso pode levar alguns momentos...</p>
                </div>
            `;

            try {
                // Obter a chave de API do localStorage
                const apiKey = localStorage.getItem('geminApiKey');
                
                const response = await fetch('/api/gerar-treino', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ apiKey: apiKey })
                });

                const resultado = await response.json();

                if (resultado.sucesso) {
                    // Mostrar info da pessoa
                    document.getElementById('infoContainer').innerHTML = `
                        <div class="info-pessoa">
                            <h3>👤 Avaliação de: ${resultado.dadosPessoa}</h3>
                            <p>Data de geração: ${new Date(resultado.dataCriacao).toLocaleDateString('pt-BR', { year: 'numeric', month: 'long', day: 'numeric' })}</p>
                        </div>
                    `;

                    // Mostrar treino formatado
                    const treinoHTML = formatarTreino(resultado.planoTreino);
                    container.innerHTML = `<div class="treino-content">${treinoHTML}</div>`;
                    
                    // Ocultar config
                    document.getElementById('configSection').style.display = 'none';
                } else {
                    container.innerHTML = `
                        <div class="error-message">
                            ❌ Erro ao gerar treino: ${resultado.erro}
                        </div>
                        <div style="text-align: center; margin-top: 20px;">
                            <p>A chave de API do Google Gemini não está configurada ou é inválida.</p>
                            <p>Por favor:</p>
                            <ol style="text-align: left; display: inline-block;">
                                <li>Acesse <a href="https://ai.google.dev/" target="_blank" style="color: #2bf0ff;">https://ai.google.dev/</a></li>
                                <li>Gere uma nova chave de API</li>
                                <li>Cole a chave no campo acima</li>
                                <li>Clique em "Salvar Chave"</li>
                            </ol>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Erro:', error);
                container.innerHTML = `
                    <div class="error-message">
                        ❌ Erro ao conectar ao servidor: ${error.message}
                    </div>
                `;
            }
        }

        function formatarTreino(texto) {
            // Formatar o texto do treino como HTML
            let html = texto
                // H2 - Seções principais
                .replace(/^###\s+(.+)$/gm, '<h3>$1</h3>')
                .replace(/^##\s+(.+)$/gm, '<h2>$1</h2>')
                // Listas
                .replace(/^\s*[-*]\s+(.+)$/gm, '<li>$1</li>')
                // Números
                .replace(/^\s*(\d+)\.\s+(.+)$/gm, '<li>$2</li>')
                // Quebras de linha
                .replace(/\n\n/g, '</p><p>')
                // Negrito
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/__(.+?)__/g, '<strong>$1</strong>');

            // Envolver listas
            html = html.replace(/(<li>.*?<\/li>)/s, '<ul>$1</ul>');

            return html;
        }

        function exportarPDF() {
            alert('Função de exportação PDF em desenvolvimento!');
        }

        // Verificar se há chave de API salva
        document.addEventListener('DOMContentLoaded', () => {
            const apiKeySalva = localStorage.getItem('geminApiKey');
            if (apiKeySalva) {
                document.getElementById('configSection').style.display = 'none';
                gerarTreino();
            }
        });
    </script>
</body>
</html>
